<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#e9eee9" />
    <title>WY 面试实验室</title>
    <meta
      name="description"
      content="从 Markdown 自动生成的个人面试学习驾驶舱：题库、公司面经、模拟面试、复习计划和技术文章。"
    />
    <link rel="stylesheet" href="./styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify/dist/purify.min.js"></script>
    <script defer src="./app.js"></script>
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="#/overview" aria-label="返回总览">
        <span class="brand-mark">WY</span>
        <span>
          <strong>面试实验室</strong>
          <small>INTERVIEW LAB</small>
        </span>
      </a>

      <nav class="desktop-nav" aria-label="主导航">
        <a href="#/overview" data-view="overview">总览</a>
        <a href="#/questions" data-view="questions">题库</a>
        <a href="#/companies" data-view="companies">公司面经</a>
        <a href="#/interviews" data-view="interviews">模拟面试</a>
        <a href="#/plans" data-view="plans">计划</a>
      </nav>

      <label class="global-search">
        <span class="sr-only">搜索文章</span>
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <circle cx="11" cy="11" r="6.5"></circle>
          <path d="m16 16 4 4"></path>
        </svg>
        <input id="search-input" type="search" placeholder="搜索题目、公司、技术方向" />
      </label>
    </header>

    <main id="app" class="app-main" aria-live="polite">
      <div class="loading-state">
        <span></span>
        <p>正在整理今天的学习记录…</p>
      </div>
    </main>

    <nav class="mobile-nav" aria-label="移动端主导航">
      <a href="#/overview" data-view="overview"><span>⌂</span>总览</a>
      <a href="#/questions" data-view="questions"><span>◇</span>题库</a>
      <a href="#/companies" data-view="companies"><span>◎</span>公司</a>
      <a href="#/interviews" data-view="interviews"><span>▥</span>模拟</a>
      <a href="#/plans" data-view="plans"><span>✓</span>计划</a>
    </nav>
  </body>
</html>
